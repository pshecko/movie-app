name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start movie API
        run: |
          npm run api -- --host 127.0.0.1 > /tmp/json-server.log 2>&1 &
          echo "JSON_SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for movie API
        run: |
          for attempt in {1..20}; do
            if curl --silent --fail http://127.0.0.1:3000/movies > /tmp/movies.json; then
              cat /tmp/movies.json
              exit 0
            fi

            sleep 1
          done

          cat /tmp/json-server.log
          exit 1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build Angular app
        run: npm run build -- --base-href "${{ steps.pages.outputs.base_path }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/movie-app/browser

      - name: Stop movie API
        if: always()
        run: |
          if [ -n "${JSON_SERVER_PID:-}" ]; then
            kill "$JSON_SERVER_PID" || true
          fi

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
